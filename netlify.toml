[build]
  command = "npm run build && cp public/_redirects dist/client/_redirects"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[context.production.environment]
  SECRETS_SCAN_OMIT_KEYS = "META_GRAPH_API_VERSION,BOTLY_PUBLIC_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/api/webhook/whatsapp"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST"
